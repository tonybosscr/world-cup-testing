name: World Cup Prediction Bot

on:
  schedule:
    - cron: '17 */4 * * *'
    - cron: '7 * * * *'
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEB_APP_URL: ${{ secrets.TELEGRAM_WEB_APP_URL }}
        run: |
          python src/main.py

      - name: Commit latest outputs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output mini_app pages data || true
          git diff --cached --quiet || git commit -m "Update prediction outputs"
          git push || true
